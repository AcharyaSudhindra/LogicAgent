<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VCD Waveform Verifier</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --line: #d6dfeb;
      --text: #1d2733;
      --ok: #0d8a5b;
      --bad: #c0392b;
      --accent: #2056d4;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(120deg, #eef3ff, #f7fbff 45%, #f8f7ff);
      color: var(--text);
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.3rem;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    input[type="file"] {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #fff;
    }

    button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      padding: 8px 12px;
      font-weight: 600;
      cursor: pointer;
    }

    button.secondary {
      background: #fff;
      color: var(--accent);
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 12px;
      margin-top: 12px;
    }

    #verdict {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .ok { color: var(--ok); }
    .bad { color: var(--bad); }

    #errorList {
      margin: 0;
      padding-left: 18px;
      color: var(--bad);
    }

    #waveformWrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fcfdff;
    }

    svg {
      display: block;
      min-width: 900px;
    }

    pre {
      margin: 0;
      padding: 10px;
      font-size: 0.82rem;
      line-height: 1.35;
      white-space: pre-wrap;
      background: #f7f9fc;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .muted {
      color: #546377;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>VCD Waveform Verifier (Demo rule: y = a AND b)</h1>
    <div class="muted">Backend API: <code>/upload</code> and <code>/visualize</code> on <code>http://127.0.0.1:5000</code></div>

    <div class="controls">
      <input id="fileInput" type="file" accept=".vcd" />
      <button id="runLocalBtn" class="secondary">Run Local Check</button>
      <button id="runBackendBtn">Run Backend Check</button>
      <button id="loadSampleBtn" class="secondary">Load Sample</button>
    </div>

    <div class="panel">
      <div id="verdict">Verdict: Waiting for input</div>
      <ul id="errorList"></ul>
    </div>

    <div class="panel">
      <strong>Waveform Viewer</strong>
      <div id="waveformWrap">
        <svg id="waveformSvg" width="1000" height="320"></svg>
      </div>
    </div>

    <div class="panel">
      <strong>Sample VCD (intentional mismatch at t=30ns)</strong>
      <pre id="sampleBox"></pre>
    </div>
  </div>

  <script>
    const SAMPLE_VCD = `$timescale 1ns $end
$scope module tb $end
$var wire 1 ! clk $end
$var wire 1 " a $end
$var wire 1 # b $end
$var wire 1 $ y $end
$enddefinitions $end
#0
0!
0"
0#
0$
#10
1"
#20
1#
#30
0$
#40
1$
#50
0"
#60
0#`;

    let currentText = "";

    function appendTransition(transitions, signal, time, value) {
      if (!transitions[signal]) transitions[signal] = [];
      const arr = transitions[signal];
      if (arr.length === 0) {
        arr.push({ time, value });
        return;
      }
      const last = arr[arr.length - 1];
      if (last.time === time) {
        last.value = value;
      } else if (last.value !== value) {
        arr.push({ time, value });
      }
    }

    function parseVCD(text) {
      const lines = text.split(/\r?\n/);
      const idToSignal = {};
      const transitions = {};
      let currentTime = 0;
      let timescale = "1ns";

      for (const raw of lines) {
        const line = raw.trim();
        if (!line) continue;

        if (line.startsWith("$timescale") && line.includes("$end")) {
          timescale = line.replace("$timescale", "").replace("$end", "").trim() || "1ns";
          continue;
        }

        if (line.startsWith("$var")) {
          const p = line.split(/\s+/);
          if (p.length >= 5) {
            idToSignal[p[3]] = p[4];
            transitions[p[4]] = transitions[p[4]] || [];
          }
          continue;
        }

        if (line.startsWith("#")) {
          const t = Number(line.slice(1).trim());
          if (!Number.isNaN(t)) currentTime = t;
          continue;
        }

        if (/^[01xXzZ].+/.test(line)) {
          const value = line[0].toLowerCase();
          const id = line.slice(1).trim();
          const sig = idToSignal[id];
          if (sig) appendTransition(transitions, sig, currentTime, value);
          continue;
        }

        if (/^[bBrR][01xXzZ]+/.test(line)) {
          const p = line.split(/\s+/);
          if (p.length === 2) {
            const value = p[0].slice(1).toLowerCase();
            const id = p[1];
            const sig = idToSignal[id];
            if (sig) appendTransition(transitions, sig, currentTime, value);
          }
        }
      }

      return { timescale, transitions };
    }

    function valueAt(arr, t) {
      let value = "x";
      for (const tr of arr || []) {
        if (tr.time <= t) value = tr.value;
        else break;
      }
      return value;
    }

    function localCheck(parsed) {
      const transitions = parsed.transitions;
      const timescale = parsed.timescale || "1ns";
      const errors = [];

      for (const sig of ["a", "b", "y"]) {
        if (!transitions[sig] || transitions[sig].length === 0) {
          errors.push({ type: "missing", signal: sig, time: null, message: `Missing required signal '${sig}'.` });
        }
      }

      if (errors.length > 0) return { verdict: "Incorrect", errors, timescale };

      const timeSet = new Set([0]);
      ["a", "b", "y"].forEach(sig => transitions[sig].forEach(tr => timeSet.add(tr.time)));
      const times = [...timeSet].sort((a, b) => a - b);

      const expectedTransitionTimes = new Set([0]);
      let prevExpected = null;

      for (const t of times) {
        const a = valueAt(transitions.a, t);
        const b = valueAt(transitions.b, t);
        const y = valueAt(transitions.y, t);

        let expected = "x";
        if ((a === "0" || a === "1") && (b === "0" || b === "1")) {
          expected = (a === "1" && b === "1") ? "1" : "0";
        }

        if (prevExpected === null) prevExpected = expected;
        else if (expected !== prevExpected) {
          expectedTransitionTimes.add(t);
          prevExpected = expected;
        }

        if ((expected === "0" || expected === "1") && y !== expected) {
          errors.push({
            type: "mismatch",
            signal: "y",
            time: t,
            message: `Signal mismatch at t=${t}${timescale.replace("1", "")}: expected y=${expected}, got y=${y}.`
          });
        }
      }

      const yTransitions = transitions.y || [];
      for (let i = 1; i < yTransitions.length; i++) {
        const t = yTransitions[i].time;
        if (!expectedTransitionTimes.has(t)) {
          errors.push({
            type: "timing",
            signal: "y",
            time: t,
            message: `Timing violation: y changed unexpectedly at t=${t}${timescale.replace("1", "")}.`
          });
        }
      }

      return { verdict: errors.length ? "Incorrect" : "Correct", errors, timescale };
    }

    function createSvgEl(tag, attrs = {}) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, String(v));
      return el;
    }

    function renderWaveform(parsed, result) {
      const svg = document.getElementById("waveformSvg");
      while (svg.firstChild) svg.removeChild(svg.firstChild);

      const transitions = parsed.transitions;
      const allSignals = Object.keys(transitions);
      if (allSignals.length === 0) return;

      const preferred = ["clk", "a", "b", "y"];
      const signals = preferred.filter(s => allSignals.includes(s)).concat(allSignals.filter(s => !preferred.includes(s)));

      let maxTime = 1;
      signals.forEach(sig => {
        const arr = transitions[sig] || [];
        if (arr.length) maxTime = Math.max(maxTime, arr[arr.length - 1].time);
      });

      const width = 1000;
      const rowH = 56;
      const top = 28;
      const left = 90;
      const right = 30;
      const height = top + rowH * signals.length + 28;
      svg.setAttribute("width", width);
      svg.setAttribute("height", height);

      const plotW = width - left - right;
      const xOf = t => left + (t / maxTime) * plotW;

      const errorSignals = new Set((result.errors || []).map(e => e.signal).filter(Boolean));
      const errorTimes = [...new Set((result.errors || []).map(e => e.time).filter(t => t !== null))];

      for (const t of errorTimes) {
        const x = xOf(t);
        svg.appendChild(createSvgEl("line", {
          x1: x, y1: 10, x2: x, y2: height - 10,
          stroke: "#e74c3c", "stroke-dasharray": "4 4", "stroke-width": 1
        }));
      }

      signals.forEach((sig, idx) => {
        const yBase = top + idx * rowH + 28;
        const yHigh = yBase - 18;
        const yLow = yBase;
        const sigErr = errorSignals.has(sig);

        svg.appendChild(createSvgEl("text", {
          x: 12, y: yBase - 4, fill: sigErr ? "#c0392b" : "#1f2937", "font-size": 13, "font-weight": sigErr ? 700 : 500
        })).textContent = sig;

        svg.appendChild(createSvgEl("line", {
          x1: left, y1: yLow, x2: width - right, y2: yLow, stroke: "#cfd8e3", "stroke-width": 1
        }));

        const arr = transitions[sig] || [];
        if (arr.length === 0) return;

        const localTimes = new Set([0, maxTime]);
        arr.forEach(tr => localTimes.add(tr.time));
        const timeline = [...localTimes].sort((a, b) => a - b);

        for (let i = 0; i < timeline.length - 1; i++) {
          const t0 = timeline[i];
          const t1 = timeline[i + 1];
          const v0 = valueAt(arr, t0);
          const y0 = (v0 === "1") ? yHigh : yLow;

          svg.appendChild(createSvgEl("line", {
            x1: xOf(t0), y1: y0, x2: xOf(t1), y2: y0,
            stroke: sigErr ? "#c0392b" : "#2056d4", "stroke-width": 2
          }));

          const v1 = valueAt(arr, t1);
          const y1 = (v1 === "1") ? yHigh : yLow;
          if (y1 !== y0) {
            svg.appendChild(createSvgEl("line", {
              x1: xOf(t1), y1: y0, x2: xOf(t1), y2: y1,
              stroke: sigErr ? "#c0392b" : "#2056d4", "stroke-width": 2
            }));
          }
        }
      });

      for (let i = 0; i <= 5; i++) {
        const t = Math.round((i / 5) * maxTime);
        const x = xOf(t);
        svg.appendChild(createSvgEl("line", { x1: x, y1: height - 18, x2: x, y2: height - 12, stroke: "#7a8799" }));
        svg.appendChild(createSvgEl("text", { x: x - 10, y: height - 2, fill: "#5b677a", "font-size": 11 })).textContent = t;
      }
    }

    function showResult(result) {
      const verdictEl = document.getElementById("verdict");
      const list = document.getElementById("errorList");
      list.innerHTML = "";

      const ok = result.verdict === "Correct";
      verdictEl.textContent = `Verdict: ${result.verdict}`;
      verdictEl.className = ok ? "ok" : "bad";

      if (!result.errors || result.errors.length === 0) {
        const li = document.createElement("li");
        li.textContent = "No mismatches found.";
        li.style.color = "#0d8a5b";
        list.appendChild(li);
      } else {
        result.errors.forEach(err => {
          const li = document.createElement("li");
          li.textContent = err.message || String(err);
          list.appendChild(li);
        });
      }
    }

    async function runBackendCheck(file) {
      const form = new FormData();
      form.append("file", file);

      const [uploadRes, visRes] = await Promise.all([
        fetch("http://127.0.0.1:5000/upload", { method: "POST", body: form }),
        fetch("http://127.0.0.1:5000/visualize", { method: "POST", body: form })
      ]);

      const uploadData = await uploadRes.json();
      const visData = await visRes.json();

      const result = {
        verdict: uploadData.verdict || "Incorrect",
        errors: (uploadData.errors || []).map(msg => ({ signal: "y", message: msg, time: null }))
      };

      showResult(result);

      if (visData.signals) {
        const parsed = { timescale: visData.timescale || "1ns", transitions: visData.signals };
        renderWaveform(parsed, result);
      }
    }

    async function onRunLocal() {
      if (!currentText.trim()) {
        alert("Select a VCD file or click 'Load Sample' first.");
        return;
      }
      const parsed = parseVCD(currentText);
      const result = localCheck(parsed);
      showResult(result);
      renderWaveform(parsed, result);
    }

    async function onRunBackend() {
      const file = document.getElementById("fileInput").files?.[0];
      if (!file) {
        alert("Select a VCD file first for backend API check.");
        return;
      }

      try {
        await runBackendCheck(file);
      } catch (e) {
        showResult({ verdict: "Incorrect", errors: [{ message: `Backend error: ${e.message}` }] });
      }
    }

    document.getElementById("sampleBox").textContent = SAMPLE_VCD;

    document.getElementById("loadSampleBtn").addEventListener("click", () => {
      currentText = SAMPLE_VCD;
      onRunLocal();
    });

    document.getElementById("fileInput").addEventListener("change", async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      currentText = await file.text();
    });

    document.getElementById("runLocalBtn").addEventListener("click", onRunLocal);
    document.getElementById("runBackendBtn").addEventListener("click", onRunBackend);

    currentText = SAMPLE_VCD;
    onRunLocal();
  </script>
</body>
</html>
