<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waveform Verification Platform</title>
  <link rel="stylesheet" href="static/css/styles.css" />
</head>
<body>
  <div class="container">
    <section class="card">
      <div class="header-row">
        <div>
          <h1>Waveform Verification Platform</h1>
          <p class="subtitle">Vivado-ready VCD verification with multi-checker engine and signal alias mapping</p>
        </div>
        <button id="themeToggleBtn" class="theme-toggle" title="Toggle Light/Dark Mode">☾</button>
      </div>
    </section>

    <section class="card controls">
      <input id="fileInput" type="file" accept=".vcd" />
      <select id="checkerSelect"></select>
      <button id="runLocalBtn" class="secondary">Run Local Verify</button>
      <button id="runBackendBtn">Run Backend Verify</button>
      <button id="loadSampleBtn" class="secondary">Load Sample</button>
    </section>

    <section class="card">
      <div class="header-row" style="margin-bottom: 5px;">
        <h3 style="margin: 0;">Signal Mapping (optional, for Vivado hierarchy)</h3>
        <button id="autoMapBtn" class="secondary" style="padding: 6px 12px; font-size: 0.9em;">Auto Map (Smart)</button>
      </div>
      <p class="subtitle small">Map canonical names to VCD signal names. Example: <code>tb/dut/a</code>, <code>tb.dut.q</code>.</p>
      <div class="mapping-grid" id="mappingGrid">
        <!-- Populated dynamically based on selected checker -->
      </div>
    </section>

    <section class="card">
      <div class="header-row">
        <div id="verdict">Verdict: Waiting for input</div>
        <button id="explainBtn" style="display: none; background-color: var(--primary); color: white;">Explain Error</button>
      </div>
      <div id="explanationBox" style="display: none; background: var(--bg); padding: 12px; border-radius: 6px; margin-top: 10px; margin-bottom: 10px; white-space: pre-wrap; font-size: 0.9em; border: 1px solid var(--border);"></div>
      <ul id="errorList"></ul>
      <div id="metrics"></div>
    </section>

    <section class="card">
      <h3>Waveform Viewer</h3>
      <div id="waveformWrap">
        <svg id="waveformSvg" width="1100" height="350"></svg>
      </div>
    </section>

    <section class="card">
      <h3>Sample VCD</h3>
      <pre id="sampleBox"></pre>
    </section>
  </div>

  <script src="static/js/app.js"></script>
</body>
</html>
