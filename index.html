<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waveform Verification Platform</title>
  <link rel="stylesheet" href="static/css/styles.css" />
</head>
<body>
  <div class="container">
    <section class="card">
      <h1>Waveform Verification Platform</h1>
      <p class="subtitle">Modular VCD parser + rule-based verifier + visualization pipeline</p>
    </section>

    <section class="card controls">
      <input id="fileInput" type="file" accept=".vcd" />
      <button id="runLocalBtn" class="secondary">Run Local Verify</button>
      <button id="runBackendBtn">Run Backend Verify</button>
      <button id="loadSampleBtn" class="secondary">Load Sample</button>
      <select id="checkerSelect" disabled>
        <option>AND Truth Table (active)</option>
      </select>
    </section>

    <section class="card">
      <div id="verdict">Verdict: Waiting for input</div>
      <ul id="errorList"></ul>
      <div id="metrics"></div>
    </section>

    <section class="card">
      <h3>Waveform Viewer</h3>
      <div id="waveformWrap">
        <svg id="waveformSvg" width="1100" height="350"></svg>
      </div>
    </section>

    <section class="card">
      <h3>Sample VCD</h3>
      <pre id="sampleBox"></pre>
    </section>
  </div>

  <script src="static/js/app.js"></script>
</body>
</html>
